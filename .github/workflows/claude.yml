name: Claude Code

on:
  issues:
    types: [labeled]

concurrency:
  group: claude
  cancel-in-progress: false

jobs:
  implement:
    if: github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'agent-ready' && github.actor == 'sysheap'
    runs-on: [self-hosted, nix]
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Setup Nix environment
        uses: ./.github/actions/setup

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-opus-4-6'
          additional_permissions: |
            actions: read

      - name: Remove agent-ready label
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue edit "$ISSUE_NUMBER" --remove-label "agent-ready"
