name: Claude Agent

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

concurrency:
  group: claude-agent
  cancel-in-progress: false

jobs:
  implement:
    if: >-
      github.event_name == 'issues' &&
      github.event.label.name == 'agent-ready' &&
      github.actor == 'sysheap'
    runs-on: [self-hosted, nix]
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Setup Nix environment
        uses: ./.github/actions/setup

      - name: Fetch issue content
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          DELIMITER='######'
          {
            echo "content<<$DELIMITER"
            gh issue view "$ISSUE_NUMBER" --json title,body --jq '"# \(.title)\n\n\(.body)"'
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-opus-4-6 --allowedTools "*"'
          show_full_output: true
          prompt: |
            ${{ steps.issue.outputs.content }}

            Implement this. Build, test, and open a pull request.
          additional_permissions: |
            actions: read

      - name: Ensure PR exists
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH=$(git branch --show-current)
          if [ "$BRANCH" = "main" ]; then
            echo "Still on main, nothing to PR"
            exit 0
          fi
          git push -u origin "$BRANCH" 2>/dev/null || true
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists"
            exit 0
          fi
          TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
          gh pr create --title "$TITLE" --body "Closes #$ISSUE_NUMBER"

      - name: Remove agent-ready label
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue edit "$ISSUE_NUMBER" --remove-label "agent-ready"

  fix-reviews:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.label.name == 'review-ready' &&
      github.actor == 'sysheap'
    runs-on: [self-hosted, nix]
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Setup Nix environment
        uses: ./.github/actions/setup

      - name: Fetch PR review comments
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          DELIMITER='######'
          {
            echo "content<<$DELIMITER"
            echo "# PR: $(gh pr view "$PR_NUMBER" --json title --jq '.title')"
            echo ""
            echo "## Review Comments"
            gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" \
              --jq '.[] | select(.state != "APPROVED" and .body != "") | "### \(.user.login) (\(.state)):\n\(.body)\n"'
            gh api "repos/$REPO/pulls/$PR_NUMBER/comments" \
              --jq '.[] | "### \(.user.login) on \(.path):\(.line // .original_line):\n\(.body)\n"'
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-opus-4-6 --allowedTools "*"'
          show_full_output: true
          prompt: |
            ${{ steps.pr.outputs.content }}

            Address all review comments above. Build, test, and push your changes.
          additional_permissions: |
            actions: read

      - name: Remove review-ready label
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr edit "$PR_NUMBER" --remove-label "review-ready"
